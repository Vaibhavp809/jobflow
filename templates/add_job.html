{% extends "base.html" %}
{% block title %}Add Job Application{% endblock %}
{% block content %}


<div class="card">
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="company" placeholder="Company" required><br><br>
        <input type="text" name="role" placeholder="Role" required><br><br>
        <select name="status">
            <option>Applied</option>
            <option>Interview</option>
            <option>Rejected</option>
            <option>Offer</option>
        </select><br><br>
        <button type="submit">Add Job</button>
    </form>
</div>

{% endblock %}
